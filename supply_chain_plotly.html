    ];

    // Color mapping
    const colors = {
        RawMaterial: '#e74c3c',
        Parts: '#3498db',
        Assembly: '#2ecc71',
        Deploy: '#9b59b6'
    };

    const edgeColors = {
        supply: '#e74c3c',
        assembly: '#3498db',
        deploy: '#2ecc71'
    };

    // Prepare node traces by type
    const types = ['RawMaterial', 'Parts', 'Assembly', 'Deploy'];
    const traces = [];

    types.forEach(type => {
        const filtered = nodes.filter(n => n.type === type);
        traces.push({
            lat: filtered.map(n => n.lat),
            lon: filtered.map(n => n.lon),
            text: filtered.map(n => `<b>${n.name}</b><br>${n.category}<br><span style="color:#999">${n.name_en}</span>`),
            mode: 'markers',
            type: 'scattergeo',
            marker: {
                size: type === 'Deploy' ? 14 : (type === 'Assembly' ? 11 : 8),
                color: colors[type],
                line: { color: 'white', width: 2 }
            },
            name: type === 'RawMaterial' ? 'Raw Materials' : (type === 'Parts' ? 'Parts' : (type === 'Assembly' ? 'Assembly' : 'Deployment')),
            hoverinfo: 'text'
        });
    });

    // Prepare edge traces
    const edgeTraces = ['supply', 'assembly', 'deploy'];
    edgeTraces.forEach(type => {
        const filtered = edges.filter(e => e.type === type);
        const lats = [];
        const lons = [];
        
        filtered.forEach(e => {
            lats.push(e.source_lat);
            lats.push(e.target_lat);
            lats.push(null);
            lons.push(e.source_lon);
            lons.push(e.target_lon);
            lons.push(null);
        });

        traces.push({
            lat: lats,
            lon: lons,
            mode: 'lines',
            type: 'scattergeo',
            line: { color: edgeColors[type], width: 2 },
            name: type === 'supply' ? 'Supply Chain' : (type === 'assembly' ? 'Assembly Flow' : 'Deployment Route'),
            hoverinfo: 'skip'
        });
    });

            showcountries: true,

            lonaxis: { range: [-180, 180] },

        },

    };

    const config = {
        responsive: true,
        displayModeBar: true,
        modeBarButtonsToRemove: ['lasso2d', 'select2d']
    };

    Plotly.newPlot('map', traces, layout, config);
